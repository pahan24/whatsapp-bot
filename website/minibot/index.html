<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SASA MD — Mini Bot</title>
<link rel="stylesheet" href="/css/global.css"/>
<style>
.mb-hero{
  padding:3rem 1.5rem 2rem;text-align:center;
}
.mb-hero h1{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(2rem,8vw,3.5rem);font-weight:900;
  line-height:1.1;margin-bottom:1rem;
}
.mb-hero h1 .the{color:var(--white);}
.mb-hero h1 .mini{color:var(--gold);}
.mb-hero p{color:var(--white3);font-size:0.95rem;line-height:1.7;max-width:400px;margin:0 auto 2.5rem;font-family:'Share Tech Mono',monospace;}

.mb-btns{display:flex;flex-direction:column;gap:0.8rem;max-width:380px;margin:0 auto;}
.mb-btn{
  display:flex;align-items:center;gap:12px;
  width:100%;padding:1rem 1.4rem;border-radius:12px;
  font-weight:700;font-size:0.95rem;letter-spacing:0.5px;
  border:none;cursor:pointer;transition:all 0.25s;
  text-decoration:none;
}
.mb-btn-red{background:var(--red);color:var(--white);box-shadow:0 4px 20px rgba(232,0,29,0.35);}
.mb-btn-red:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(232,0,29,0.5);}
.mb-btn-dark{background:rgba(255,255,255,0.06);color:var(--white);border:1px solid rgba(255,255,255,0.1);}
.mb-btn-dark:hover{background:rgba(255,255,255,0.1);}
.mb-btn-green{background:rgba(0,200,80,0.1);color:var(--green);border:1px solid rgba(0,200,80,0.25);}
.mb-btn-green:hover{background:rgba(0,200,80,0.18);}
.mb-btn-blue{background:rgba(0,123,255,0.1);color:#5b9dff;border:1px solid rgba(0,123,255,0.25);}
.mb-btn-blue:hover{background:rgba(0,123,255,0.18);}
.mb-btn-gold{background:rgba(245,166,35,0.12);color:var(--gold);border:1px solid rgba(245,166,35,0.3);}
.mb-btn-gold:hover{background:rgba(245,166,35,0.2);}
.mb-btn-icon{font-size:1.2rem;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.08);border-radius:8px;flex-shrink:0;}
.mb-btn-text{text-align:left;}
.mb-btn-arrow{margin-left:auto;opacity:0.5;}

.mascot{text-align:center;font-size:6rem;margin-top:2rem;animation:floatMascot 3s ease-in-out infinite;}
@keyframes floatMascot{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}

/* status card */
.status-card{
  max-width:380px;margin:1.5rem auto 0;
  background:rgba(0,200,80,0.07);border:1px solid rgba(0,200,80,0.2);
  border-radius:14px;padding:1rem 1.2rem;
  display:flex;align-items:center;gap:10px;
}
.status-dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:blink 1.5s infinite;flex-shrink:0;}
.status-txt{font-size:0.85rem;color:var(--green);font-weight:600;}
.status-num{font-family:'Share Tech Mono',monospace;font-size:0.78rem;color:var(--white3);}
</style>
</head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="bg-radial"></div>
<nav id="navbar"></nav>

<div class="page-wrap">
  <div class="mb-hero">
    <div class="sec-label anim-up">Mini Bot Edition</div>
    <h1 class="anim-up d1">
      THE <span class="mini">MINI BOT</span><br/>EDITION
    </h1>
    <p class="anim-up d2">
      Fast, Secure, and Simplified WhatsApp Automation.
      Experience the best features with minimal setup.
    </p>

    <div id="statusCard" class="status-card anim-up d2" style="display:none;">
      <div class="status-dot"></div>
      <div>
        <div class="status-txt">BOT CONNECTED ✓</div>
        <div class="status-num" id="statusNum"></div>
      </div>
    </div>

    <div class="mb-btns anim-up d3" style="margin-top:2rem;">
      <a href="/minibot/create" class="mb-btn mb-btn-red">
        <div class="mb-btn-icon">🔗</div>
        <span class="mb-btn-text">DEPLOY NOW</span>
        <span class="mb-btn-arrow">›</span>
      </a>
      <a href="/minibot/setting" class="mb-btn mb-btn-dark">
        <div class="mb-btn-icon">⚙</div>
        <span class="mb-btn-text">SETTINGS</span>
        <span class="mb-btn-arrow">›</span>
      </a>
      <a href="/minibot/autosave" class="mb-btn mb-btn-green">
        <div class="mb-btn-icon">💾</div>
        <span class="mb-btn-text">AUTO SAVE</span>
        <span class="mb-btn-arrow">›</span>
      </a>
      <a href="/minibot/autoreply" class="mb-btn mb-btn-blue">
        <div class="mb-btn-icon">🤖</div>
        <span class="mb-btn-text">AUTO REPLY</span>
        <span class="mb-btn-arrow">›</span>
      </a>
      <a href="/minibot/coin" class="mb-btn mb-btn-gold">
        <div class="mb-btn-icon">💰</div>
        <span class="mb-btn-text">COIN</span>
        <span class="mb-btn-arrow">›</span>
      </a>
    </div>

    <div class="mascot anim-up d4">🐸</div>
  </div>

  <footer>
    <div class="footer-logo"><span>SASA</span> MD</div>
    <p>© 2025 SASA MD TEAM</p>
  </footer>
</div>

<script src="/js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (sasaAuth.isLoggedIn()) {
    const sc = document.getElementById('statusCard');
    const sn = document.getElementById('statusNum');
    sc.style.display = 'flex';
    const num = sasaAuth.getNumber();
    sn.textContent = 'Logged in as: ' + num;
  }
});
</script>
</body>
</html>
